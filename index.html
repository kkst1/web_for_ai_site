<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十三的AI聚集站</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0c1a2f;
      --panel: rgba(8, 20, 37, 0.82);
      --panel-strong: rgba(10, 25, 46, 0.95);
      --card: rgba(10, 24, 42, 0.9);
      --line: rgba(96, 151, 255, 0.26);
      --line-strong: rgba(74, 213, 255, 0.42);
      --text: #ebf4ff;
      --muted: #91a6c4;
      --accent: #4ad5ff;
      --accent-2: #6e7bff;
      --danger: #ff667a;
      --success: #72f0c7;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 213, 255, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(110, 123, 255, 0.14), transparent 24%),
        linear-gradient(180deg, #050b14 0%, #07111f 45%, #091628 100%);
      padding: 34px 18px 56px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74, 213, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 213, 255, 0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.7), transparent 92%);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(9, 22, 40, 0.96), rgba(7, 17, 31, 0.88));
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 4.7rem);
      line-height: 1.02;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.7;
    }

    .panel-row {
      margin-top: 24px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      align-items: end;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(7, 17, 31, 0.88);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(74, 213, 255, 0.12);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #6780a7;
    }

    button {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .submit-button {
      height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 36px rgba(74, 213, 255, 0.18);
    }

    .secondary-button,
    .danger-button,
    .ghost-button {
      padding: 11px 14px;
      font-size: 0.92rem;
    }

    .secondary-button {
      background: rgba(74, 213, 255, 0.12);
      color: var(--accent);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
    }

    .danger-button {
      background: rgba(255, 102, 122, 0.12);
      color: var(--danger);
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status {
      min-height: 24px;
      color: var(--success);
      font-size: 0.95rem;
    }

    .status.error {
      color: var(--danger);
    }

    .board {
      margin-top: 28px;
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      align-items: start;
    }

    .category-column {
      display: flex;
      flex-direction: column;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(10, 25, 46, 0.96), rgba(8, 20, 37, 0.9));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .category-column.dragging {
      opacity: 0.56;
      transform: scale(0.985);
    }

    .category-column.drag-target {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 2px rgba(74, 213, 255, 0.18), var(--shadow);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(96, 151, 255, 0.14);
      cursor: grab;
      user-select: none;
      background: linear-gradient(90deg, rgba(74, 213, 255, 0.06), rgba(110, 123, 255, 0.05));
    }

    .category-title-wrap {
      min-width: 0;
    }

    .category-title {
      margin: 0;
      font-size: 1.18rem;
      word-break: break-word;
    }

    .category-count {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .category-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 0.92rem;
    }

    .icon-button.delete {
      color: var(--danger);
      background: rgba(255, 102, 122, 0.08);
    }

    .category-dropzone {
      min-height: 140px;
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .category-dropzone.drag-target {
      background: rgba(74, 213, 255, 0.05);
    }

    .empty-category {
      padding: 22px 14px;
      text-align: center;
      color: #6f86aa;
      border: 1px dashed rgba(96, 151, 255, 0.22);
      border-radius: 18px;
    }

    .site-card {
      position: relative;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(96, 151, 255, 0.18);
      background: linear-gradient(180deg, rgba(12, 28, 49, 0.96), rgba(8, 20, 37, 0.92));
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.24);
      cursor: grab;
      user-select: none;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .site-card:hover {
      transform: translateY(-2px);
      border-color: rgba(74, 213, 255, 0.4);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.32);
    }

    .site-card.dragging {
      opacity: 0.55;
      transform: scale(0.985);
    }

    .site-card::before {
      content: "拖动网站";
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(74, 213, 255, 0.1);
      color: var(--accent);
      font-size: 0.74rem;
    }

    .site-name {
      margin: 0 0 12px;
      padding-right: 76px;
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .site-link {
      color: #b6d8ff;
      text-decoration: none;
      word-break: break-all;
      font-size: 0.94rem;
    }

    .site-link:hover {
      text-decoration: underline;
    }

    .site-category {
      display: inline-flex;
      margin-top: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(110, 123, 255, 0.16);
      color: #c7ceff;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .site-meta {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .empty-state {
      margin-top: 24px;
      padding: 26px;
      border: 1px dashed rgba(96, 151, 255, 0.28);
      border-radius: 22px;
      text-align: center;
      color: var(--muted);
      background: rgba(8, 20, 37, 0.72);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(1, 6, 14, 0.72);
      z-index: 20;
    }

    .modal[hidden] {
      display: none;
    }

    .modal-panel {
      width: min(100%, 460px);
      padding: 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: var(--shadow);
    }

    .modal-title {
      margin: 0;
      font-size: 1.26rem;
    }

    .modal-subtitle {
      margin: 10px 0 18px;
      color: var(--muted);
      line-height: 1.65;
      word-break: break-word;
    }

    .modal-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 14px 40px;
      }

      .hero {
        padding: 22px;
      }

      .site-name {
        padding-right: 0;
      }

      .site-card::before {
        position: static;
        display: inline-flex;
        margin-bottom: 12px;
      }

      .site-meta,
      .modal-actions {
        flex-direction: column;
        align-items: flex-start;
      }

      .category-header {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>十三的AI聚集站</h1>
      <p class="subtitle">共享收录、跨分类拖拽、分类独立排序。现在所有分类和网站都能直接在页面里增删改排。</p>

      <form id="siteForm" class="panel-row">
        <div>
          <label for="siteName">网站名字</label>
          <input id="siteName" type="text" placeholder="例如：ChatGPT">
        </div>
        <div>
          <label for="siteUrl">网站网址</label>
          <input id="siteUrl" type="text" inputmode="url" placeholder="https://example.com 或 example.com" required>
        </div>
        <div>
          <label for="siteCategory">网站分类</label>
          <input id="siteCategory" type="text" list="categoryOptions" placeholder="GPT / Gemini / 其他 / 自定义">
        </div>
        <button id="submitButton" class="submit-button" type="submit">加入聚集站</button>
      </form>

      <div class="toolbar">
        <div class="hint">拖动分类头可调整分类顺序。拖动网站卡片可跨分类移动。点击网站卡片可修改分类。</div>
        <button id="addCategoryButton" class="secondary-button" type="button">新增分类</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section id="emptyState" class="empty-state">还没有收录网站，先添加一个网站或分类。</section>
    <section id="siteBoard" class="board" aria-live="polite"></section>
  </main>

  <datalist id="categoryOptions"></datalist>

  <div id="categoryModal" class="modal" hidden>
    <div class="modal-panel">
      <h2 class="modal-title">修改网站分类</h2>
      <p id="categoryModalSubtitle" class="modal-subtitle"></p>
      <label for="modalCategoryInput">分类名称</label>
      <input id="modalCategoryInput" type="text" list="categoryOptions" placeholder="输入已有分类或新分类">
      <div class="modal-actions">
        <button id="modalCancelButton" class="ghost-button" type="button">取消</button>
        <button id="modalSaveButton" class="submit-button" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="newCategoryModal" class="modal" hidden>
    <div class="modal-panel">
      <h2 class="modal-title">新增分类</h2>
      <p class="modal-subtitle">输入新的分类名称，创建后即可拖拽排序，也能把网站移入其中。</p>
      <label for="newCategoryInput">分类名称</label>
      <input id="newCategoryInput" type="text" placeholder="例如：Claude">
      <div class="modal-actions">
        <button id="newCategoryCancelButton" class="ghost-button" type="button">取消</button>
        <button id="newCategorySaveButton" class="submit-button" type="button">创建分类</button>
      </div>
    </div>
  </div>

  <script src="./site-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const siteForm = document.getElementById("siteForm");
    const siteNameInput = document.getElementById("siteName");
    const siteUrlInput = document.getElementById("siteUrl");
    const siteCategoryInput = document.getElementById("siteCategory");
    const submitButton = document.getElementById("submitButton");
    const siteBoard = document.getElementById("siteBoard");
    const emptyState = document.getElementById("emptyState");
    const statusNode = document.getElementById("status");
    const categoryOptions = document.getElementById("categoryOptions");
    const addCategoryButton = document.getElementById("addCategoryButton");

    const categoryModal = document.getElementById("categoryModal");
    const categoryModalSubtitle = document.getElementById("categoryModalSubtitle");
    const modalCategoryInput = document.getElementById("modalCategoryInput");
    const modalCancelButton = document.getElementById("modalCancelButton");
    const modalSaveButton = document.getElementById("modalSaveButton");

    const newCategoryModal = document.getElementById("newCategoryModal");
    const newCategoryInput = document.getElementById("newCategoryInput");
    const newCategoryCancelButton = document.getElementById("newCategoryCancelButton");
    const newCategorySaveButton = document.getElementById("newCategorySaveButton");

    const config = window.APP_CONFIG || {};
    const supabaseUrl = config.supabaseUrl;
    const supabaseAnonKey = config.supabaseAnonKey;
    const defaultCategories = ["GPT", "Gemini", "其他"];

    let supabase = null;
    let categoriesState = [];
    let sitesState = [];
    let draggedSite = null;
    let draggedCategory = null;
    let editingSite = null;
    let isSavingSiteOrder = false;
    let isSavingCategoryOrder = false;

    function setStatus(message, isError) {
      statusNode.textContent = message || "";
      statusNode.classList.toggle("error", Boolean(isError));
    }

    function setSubmitLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "提交中..." : "加入聚集站";
    }

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      return /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
    }

    function normalizeUrlForCompare(value) {
      try {
        const parsed = new URL(normalizeUrl(value));
        parsed.hash = "";
        parsed.hostname = parsed.hostname.toLowerCase();
        if ((parsed.protocol === "https:" && parsed.port === "443") || (parsed.protocol === "http:" && parsed.port === "80")) {
          parsed.port = "";
        }
        if (parsed.pathname.endsWith("/") && parsed.pathname !== "/") {
          parsed.pathname = parsed.pathname.slice(0, -1);
        }
        return parsed.toString();
      } catch {
        return normalizeUrl(value).trim().toLowerCase();
      }
    }

    function normalizeDomainForCompare(value) {
      try {
        const parsed = new URL(normalizeUrl(value));
        return parsed.hostname.toLowerCase().replace(/^www\./i, "");
      } catch {
        return "";
      }
    }

    function normalizeCategory(value) {
      const trimmed = (value || "").trim();
      return trimmed || "其他";
    }

    function inferSiteName(url) {
      try {
        return new URL(url).hostname.replace(/^www\./i, "");
      } catch {
        return "未命名网站";
      }
    }

    function formatTime(value) {
      try {
        return new Date(value).toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return "";
      }
    }

    function updateEmptyState() {
      emptyState.hidden = categoriesState.length > 0 || sitesState.length > 0;
    }

    function refreshCategoryOptions() {
      categoryOptions.innerHTML = "";
      categoriesState.forEach((category) => {
        const option = document.createElement("option");
        option.value = category.name;
        categoryOptions.appendChild(option);
      });
    }

    async function ensureCategoryExists(name) {
      const categoryName = normalizeCategory(name);
      const existing = categoriesState.find((item) => item.name === categoryName);
      if (existing) return existing;

      const nextSortOrder = categoriesState.length + 1;
      const { data, error } = await supabase
        .from("ai_categories")
        .insert({ name: categoryName, sort_order: nextSortOrder })
        .select("id, name, sort_order, created_at")
        .single();

      if (error) {
        if (error.code === "23505") {
          await loadAllData();
          return categoriesState.find((item) => item.name === categoryName) || null;
        }
        throw error;
      }

      categoriesState.push(data);
      categoriesState.sort((a, b) => a.sort_order - b.sort_order);
      refreshCategoryOptions();
      return data;
    }

    async function loadAllData() {
      setStatus("正在同步分类和网站...");

      const [{ data: categories, error: categoryError }, { data: sites, error: siteError }] = await Promise.all([
        supabase
          .from("ai_categories")
          .select("id, name, sort_order, created_at")
          .order("sort_order", { ascending: true })
          .order("created_at", { ascending: true }),
        supabase
          .from("ai_sites")
          .select("id, name, url, category, sort_order, created_at")
          .order("sort_order", { ascending: true })
          .order("created_at", { ascending: true })
      ]);

      if (categoryError) {
        setStatus(`读取分类失败：${categoryError.message}`, true);
        return;
      }

      if (siteError) {
        setStatus(`读取网站失败：${siteError.message}`, true);
        return;
      }

      categoriesState = categories || [];
      sitesState = sites || [];
      refreshCategoryOptions();
      renderBoard();
      setStatus(`已同步 ${categoriesState.length} 个分类，${sitesState.length} 个网站。`);
    }

    function createSiteCard(site) {
      const card = document.createElement("article");
      card.className = "site-card";
      card.draggable = true;
      card.dataset.id = site.id;
      card.dataset.category = site.category;

      const title = document.createElement("h3");
      title.className = "site-name";
      title.textContent = site.name;

      const link = document.createElement("a");
      link.className = "site-link";
      link.href = site.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = site.url;

      const tag = document.createElement("div");
      tag.className = "site-category";
      tag.textContent = site.category;

      const meta = document.createElement("div");
      meta.className = "site-meta";

      const time = document.createElement("span");
      time.textContent = site.created_at ? `收录时间：${formatTime(site.created_at)}` : "已收录";

      const deleteButton = document.createElement("button");
      deleteButton.className = "danger-button";
      deleteButton.type = "button";
      deleteButton.textContent = "删除网站";
      deleteButton.addEventListener("click", async (event) => {
        event.stopPropagation();
        deleteButton.disabled = true;
        setStatus("正在删除网站...");

        const { error } = await supabase.from("ai_sites").delete().eq("id", site.id);
        if (error) {
          deleteButton.disabled = false;
          setStatus(`删除失败：${error.message}`, true);
          return;
        }

        await loadAllData();
        setStatus("网站已删除。");
      });

      meta.append(time, deleteButton);
      card.append(title, link, tag, meta);

      card.addEventListener("dragstart", handleSiteDragStart);
      card.addEventListener("dragend", handleSiteDragEnd);
      card.addEventListener("click", (event) => {
        if (event.target.closest("a") || event.target.closest("button")) return;
        editingSite = site;
        categoryModalSubtitle.textContent = `${site.name} · ${site.url}`;
        modalCategoryInput.value = site.category;
        categoryModal.hidden = false;
        modalCategoryInput.focus();
        modalCategoryInput.select();
      });

      return card;
    }

    function createCategoryColumn(category) {
      const section = document.createElement("section");
      section.className = "category-column";
      section.dataset.category = category.name;
      section.dataset.categoryId = category.id;
      section.draggable = true;

      const header = document.createElement("div");
      header.className = "category-header";

      const titleWrap = document.createElement("div");
      titleWrap.className = "category-title-wrap";

      const title = document.createElement("h2");
      title.className = "category-title";
      title.textContent = category.name;

      const count = document.createElement("div");
      count.className = "category-count";
      const countNumber = sitesState.filter((site) => site.category === category.name).length;
      count.textContent = `${countNumber} 个网站`;

      titleWrap.append(title, count);

      const actions = document.createElement("div");
      actions.className = "category-actions";

      const renameButton = document.createElement("button");
      renameButton.className = "icon-button";
      renameButton.type = "button";
      renameButton.textContent = "改";
      renameButton.title = "修改分类名";
      renameButton.addEventListener("click", async (event) => {
        event.stopPropagation();
        const newName = window.prompt("输入新的分类名", category.name);
        if (newName === null) return;
        const normalized = normalizeCategory(newName);
        if (!normalized || normalized === category.name) return;

        const sameName = categoriesState.find((item) => item.name === normalized);
        if (sameName) {
          setStatus("这个分类名已经存在。", true);
          return;
        }

        setStatus("正在修改分类名...");

        const { error: categoryError } = await supabase
          .from("ai_categories")
          .update({ name: normalized })
          .eq("id", category.id);

        if (categoryError) {
          setStatus(`分类修改失败：${categoryError.message}`, true);
          return;
        }

        const { error: sitesError } = await supabase
          .from("ai_sites")
          .update({ category: normalized })
          .eq("category", category.name);

        if (sitesError) {
          setStatus(`网站分类同步失败：${sitesError.message}`, true);
          return;
        }

        await loadAllData();
        setStatus("分类名已更新。");
      });

      const deleteButton = document.createElement("button");
      deleteButton.className = "icon-button delete";
      deleteButton.type = "button";
      deleteButton.textContent = "删";
      deleteButton.title = "删除分类";
      deleteButton.addEventListener("click", async (event) => {
        event.stopPropagation();
        const countSites = sitesState.filter((site) => site.category === category.name).length;
        const confirmed = window.confirm(`删除分类“${category.name}”后，该分类下 ${countSites} 个网站也会一起删除。继续吗？`);
        if (!confirmed) return;

        setStatus("正在删除分类...");

        const { error: sitesError } = await supabase.from("ai_sites").delete().eq("category", category.name);
        if (sitesError) {
          setStatus(`删除分类下网站失败：${sitesError.message}`, true);
          return;
        }

        const { error: categoryError } = await supabase.from("ai_categories").delete().eq("id", category.id);
        if (categoryError) {
          setStatus(`删除分类失败：${categoryError.message}`, true);
          return;
        }

        await loadAllData();
        setStatus("分类已删除。");
      });

      actions.append(renameButton, deleteButton);
      header.append(titleWrap, actions);

      header.addEventListener("dragstart", handleCategoryDragStart);
      header.addEventListener("dragend", handleCategoryDragEnd);
      section.addEventListener("dragover", handleCategoryDragOver);
      section.addEventListener("dragenter", handleCategoryDragEnter);
      section.addEventListener("dragleave", handleCategoryDragLeave);
      section.addEventListener("drop", handleCategoryDrop);

      const dropzone = document.createElement("div");
      dropzone.className = "category-dropzone";
      dropzone.dataset.category = category.name;
      dropzone.addEventListener("dragover", handleSiteDragOver);
      dropzone.addEventListener("dragenter", () => dropzone.classList.add("drag-target"));
      dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-target"));
      dropzone.addEventListener("drop", () => dropzone.classList.remove("drag-target"));

      const sites = sitesState.filter((site) => site.category === category.name);
      if (sites.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-category";
        empty.textContent = "把网站拖到这里，或者新增一个网站。";
        dropzone.appendChild(empty);
      } else {
        sites.forEach((site) => dropzone.appendChild(createSiteCard(site)));
      }

      section.append(header, dropzone);
      return section;
    }

    function renderBoard() {
      siteBoard.innerHTML = "";

      categoriesState.forEach((category) => {
        siteBoard.appendChild(createCategoryColumn(category));
      });

      updateEmptyState();
    }

    async function persistSiteOrder() {
      if (isSavingSiteOrder) return;
      isSavingSiteOrder = true;
      setStatus("正在同步网站排序...");

      const cards = [...siteBoard.querySelectorAll(".site-card")];
      const updates = cards.map((card, index) =>
        supabase
          .from("ai_sites")
          .update({
            category: card.dataset.category,
            sort_order: index + 1
          })
          .eq("id", card.dataset.id)
      );

      const results = await Promise.all(updates);
      const failed = results.find((result) => result.error);
      isSavingSiteOrder = false;

      if (failed) {
        setStatus(`网站排序同步失败：${failed.error.message}`, true);
        return;
      }

      await loadAllData();
      setStatus("网站排序已同步。");
    }

    async function persistCategoryOrder() {
      if (isSavingCategoryOrder) return;
      isSavingCategoryOrder = true;
      setStatus("正在同步分类顺序...");

      const columns = [...siteBoard.querySelectorAll(".category-column")];
      const updates = columns.map((column, index) =>
        supabase
          .from("ai_categories")
          .update({ sort_order: index + 1 })
          .eq("id", column.dataset.categoryId)
      );

      const results = await Promise.all(updates);
      const failed = results.find((result) => result.error);
      isSavingCategoryOrder = false;

      if (failed) {
        setStatus(`分类排序同步失败：${failed.error.message}`, true);
        return;
      }

      await loadAllData();
      setStatus("分类顺序已同步。");
    }

    function handleSiteDragStart(event) {
      draggedSite = event.currentTarget;
      draggedSite.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedSite.dataset.id);
    }

    async function handleSiteDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
      if (draggedSite) {
        await persistSiteOrder();
      }
      draggedSite = null;
    }

    function handleSiteDragOver(event) {
      event.preventDefault();
      if (!draggedSite) return;

      const dropzone = event.currentTarget;
      const empty = dropzone.querySelector(".empty-category");
      if (empty) empty.remove();

      const target = event.target.closest(".site-card");
      draggedSite.dataset.category = dropzone.dataset.category;

      if (!target || target === draggedSite) {
        dropzone.appendChild(draggedSite);
        return;
      }

      const rect = target.getBoundingClientRect();
      const insertAfter = event.clientY > rect.top + rect.height / 2;
      if (insertAfter) {
        dropzone.insertBefore(draggedSite, target.nextSibling);
      } else {
        dropzone.insertBefore(draggedSite, target);
      }
    }

    function handleCategoryDragStart(event) {
      if (event.target.closest("button")) {
        event.preventDefault();
        return;
      }
      draggedCategory = event.currentTarget.closest(".category-column");
      draggedCategory.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedCategory.dataset.categoryId);
    }

    async function handleCategoryDragEnd() {
      if (draggedCategory) {
        draggedCategory.classList.remove("dragging");
        const active = draggedCategory;
        draggedCategory = null;
        await persistCategoryOrder();
        active.classList.remove("dragging");
      }
    }

    function handleCategoryDragOver(event) {
      if (!draggedCategory || draggedSite) return;
      event.preventDefault();
      const current = event.currentTarget;
      if (current === draggedCategory) return;
      const rect = current.getBoundingClientRect();
      const insertAfter = event.clientX > rect.left + rect.width / 2;
      if (insertAfter) {
        siteBoard.insertBefore(draggedCategory, current.nextSibling);
      } else {
        siteBoard.insertBefore(draggedCategory, current);
      }
    }

    function handleCategoryDragEnter(event) {
      if (!draggedCategory || draggedSite) return;
      event.currentTarget.classList.add("drag-target");
    }

    function handleCategoryDragLeave(event) {
      event.currentTarget.classList.remove("drag-target");
    }

    function handleCategoryDrop(event) {
      event.currentTarget.classList.remove("drag-target");
    }

    async function insertSite(name, url, categoryName) {
      const normalizedUrl = normalizeUrlForCompare(url);
      const normalizedDomain = normalizeDomainForCompare(url);
      if (!normalizedDomain) {
        throw new Error("网址格式不正确，无法识别域名。");
      }

      const { data: existingSite, error: checkError } = await supabase
        .from("ai_sites")
        .select("id, name, url")
        .eq("domain_normalized", normalizedDomain)
        .maybeSingle();

      if (checkError) throw checkError;
      if (existingSite) {
        throw new Error(`这个域名已经收录过了：${existingSite.name} (${existingSite.url})`);
      }

      const category = await ensureCategoryExists(categoryName);
      if (!category) {
        throw new Error("无法创建或读取分类。");
      }

      const currentCount = sitesState.length + 1;
      const { error } = await supabase
        .from("ai_sites")
        .insert({
          name,
          url,
          category: category.name,
          url_normalized: normalizedUrl,
          domain_normalized: normalizedDomain,
          sort_order: currentCount
        });

      if (error) {
        if (error.code === "23505") {
          throw new Error("这个域名已经收录过了，请不要重复添加。");
        }
        throw error;
      }
    }

    async function saveSiteCategoryChange() {
      if (!editingSite) return;
      const categoryName = normalizeCategory(modalCategoryInput.value);

      try {
        modalSaveButton.disabled = true;
        setStatus("正在更新网站分类...");
        const category = await ensureCategoryExists(categoryName);
        if (!category) throw new Error("分类创建失败。");

        const { error } = await supabase
          .from("ai_sites")
          .update({ category: category.name })
          .eq("id", editingSite.id);

        if (error) throw error;

        categoryModal.hidden = true;
        editingSite = null;
        modalCategoryInput.value = "";
        await loadAllData();
        setStatus("网站分类已更新。");
      } catch (error) {
        setStatus(`更新失败：${error.message}`, true);
      } finally {
        modalSaveButton.disabled = false;
      }
    }

    async function createCategoryFromModal() {
      const name = normalizeCategory(newCategoryInput.value);
      try {
        newCategorySaveButton.disabled = true;
        setStatus("正在创建分类...");
        await ensureCategoryExists(name);
        newCategoryModal.hidden = true;
        newCategoryInput.value = "";
        await loadAllData();
        setStatus("分类已创建。");
      } catch (error) {
        setStatus(`创建分类失败：${error.message}`, true);
      } finally {
        newCategorySaveButton.disabled = false;
      }
    }

    siteForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!supabase) {
        setStatus("Supabase 配置缺失。", true);
        return;
      }

      const url = normalizeUrl(siteUrlInput.value);
      const name = siteNameInput.value.trim() || inferSiteName(url);
      const categoryName = normalizeCategory(siteCategoryInput.value);

      try {
        setSubmitLoading(true);
        setStatus("正在提交网站...");
        await insertSite(name, url, categoryName);
        siteForm.reset();
        siteUrlInput.focus();
        await loadAllData();
        setStatus("网站已收录。");
      } catch (error) {
        setStatus(`提交失败：${error.message}`, true);
      } finally {
        setSubmitLoading(false);
      }
    });

    addCategoryButton.addEventListener("click", () => {
      newCategoryModal.hidden = false;
      newCategoryInput.value = "";
      newCategoryInput.focus();
    });

    modalCancelButton.addEventListener("click", () => {
      editingSite = null;
      categoryModal.hidden = true;
      modalCategoryInput.value = "";
    });
    modalSaveButton.addEventListener("click", saveSiteCategoryChange);
    modalCategoryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveSiteCategoryChange();
      }
    });

    newCategoryCancelButton.addEventListener("click", () => {
      newCategoryModal.hidden = true;
      newCategoryInput.value = "";
    });
    newCategorySaveButton.addEventListener("click", createCategoryFromModal);
    newCategoryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        createCategoryFromModal();
      }
    });

    [categoryModal, newCategoryModal].forEach((modal) => {
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          modal.hidden = true;
        }
      });
    });

    function initialize() {
      if (!supabaseUrl || !supabaseAnonKey) {
        setStatus("缺少 Supabase 配置。请先设置环境变量后重新部署。", true);
        return;
      }

      supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
      loadAllData();
    }

    initialize();
  </script>
</body>
</html>
